<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Calendrier d'Alimentation — Beaufort</title>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="Beaufort"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="theme-color" content="#2e7d45"/>
  <meta name="description" content="Calendrier d'alimentation pour éleveurs Beaufort"/>
  
  
  
  <link rel="manifest" href="data:application/manifest+json,{"name":"Calendrier Beaufort","short_name":"Beaufort","start_url":"./","display":"standalone","background_color":"#f7f5f0","theme_color":"#2e7d45","icons":[{"src":"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==","sizes":"192x192","type":"image/png"}]}"/>
  <link rel="apple-touch-icon" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg=="/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f7f5f0; color: #2c2416; min-height: 100vh; }
    input { font-family: inherit; }
    button { font-family: inherit; cursor: pointer; }
    :root {
      --bg: #f7f5f0; --card: #fff; --border: #e2ddd5;
      --text: #2c2416; --muted: #7a6f60;
      --green: #2e7d45; --green-light: #e8f5ec;
    }
    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #f0ede8; }
    ::-webkit-scrollbar-thumb { background: #c8bfb0; border-radius: 3px; }
    /* Table inputs */
    .cell-input {
      width: 100%; background: #fafaf8; border: 1.5px solid #d0c8be;
      border-radius: 5px; padding: 4px 6px; font-size: 13px; color: #2c2416; outline: none;
      transition: border-color .15s;
    }
    .cell-input:focus { border-color: var(--green); background: #fff; }
    .cell-input::placeholder { color: #b0a898; }
    input { color: #2c2416; font-size: 13px; }
    input::placeholder { color: #b0a898; }
    /* Dropdown fade */
    .dropdown { animation: fadeIn .12s ease; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(-4px); } to { opacity:1; transform:translateY(0); } }
    /* Tabs */
    .tab-btn { background:transparent; border:none; border-bottom:2.5px solid transparent; color:var(--muted); padding:13px 20px; font-size:13px; font-weight:400; transition:all .15s; display:flex; align-items:center; gap:6px; }
    .tab-btn.active { border-bottom-color:var(--green); color:var(--green); font-weight:700; }
    .tab-btn:hover:not(.active) { color:var(--text); }
    /* Season chips */
    .chip { border-radius:20px; padding:5px 14px; font-size:12px; border:1.5px solid; transition:all .15s; display:inline-flex; align-items:center; gap:5px; }
    /* PDF button spinner */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { display:inline-block; animation:spin .8s linear infinite; }

    /* ── PRINT ── */
    @media print {
      @page { size:A4 portrait; margin:12mm 10mm; }
      .no-print { display:none !important; }
      body { background:#fff; }
      #print-area { display:block !important; }
    }
    @media screen { #print-area { display:none; } }
  </style>
</head>
<body>

<!-- Hidden print area (fallback) -->
<div id="print-area"></div>

<!-- App root -->
<div id="app"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>

<script>
// ─── Data helpers ────────────────────────────────────────────────────────────

const CAMPAGNES = [2023,2024,2025,2026,2027,2028,2029,2030];

function makePeriodes(y1) {
  const y2 = y1+1;
  return [
    `01 - 15 avril ${y1}`,`16 - 30 avril ${y1}`,
    `01 - 15 mai ${y1}`,`16 - 31 mai ${y1}`,
    `01 - 15 juin ${y1}`,`16 - 30 juin ${y1}`,
    `01 - 15 juillet ${y1}`,`16 - 31 juillet ${y1}`,
    `01 - 15 août ${y1}`,`16 - 31 août ${y1}`,
    `01 - 15 septembre ${y1}`,`16 - 30 septembre ${y1}`,
    `01 - 15 octobre ${y1}`,`16 - 31 octobre ${y1}`,
    `01 - 15 novembre ${y1}`,`16 - 30 novembre ${y1}`,
    `01 - 15 décembre ${y1}`,`16 - 31 décembre ${y1}`,
    `01 - 15 janvier ${y2}`,`16 - 31 janvier ${y2}`,
    `01 - 14 février ${y2}`,`16 - 28 février ${y2}`,
    `01 - 15 mars ${y2}`,`16 - 31 mars ${y2}`,
  ].map(p => ({periode:p,vlT:'',vlTaries:'',pensionT:'',pensionTaries:'',ration:'',concentre:''}));
}

const MOIS_LAIT = [
  'Avril','Mai','Juin','Juillet','Août','Septembre',
  'Octobre','Novembre','Décembre','Janvier','Février','Mars'
];
const JOURS_MOIS = [30,31,30,31,31,30,31,30,31,31,28,31];

function makeLait(y1) {
  const y2 = y1+1;
  return MOIS_LAIT.map((m,i) => ({
    mois: m,
    annee: i < 9 ? y1 : y2,
    litres: '',   // total litres du mois
  }));
}

function makeDates() {
  return [
    {label:"Mise à l'herbe VL",value:'',hl:true},
    {label:'Démontagnée (<1500m d\'altitude)',value:'',hl:false},
    {label:'Arrêt du foin VL au printemps',value:'',hl:true},
    {label:'Stocks concentrés démontagnée',value:'',hl:false},
    {label:'Stocks sortie complète vaches (foin concentrés)',value:'',hl:true},
    {label:'Début distribution foin VL à l\'automne',value:'',hl:true},
    {label:'Mise à l\'herbe génisses',value:'',hl:true},
    {label:'Stocks rentrée vaches (concentrés)',value:'',hl:false},
    {label:'Mise à l\'herbe autres espèces',value:'',hl:false},
    {label:'Rentrée étable VL',value:'',hl:false},
    {label:'Emmontagnée (>1500m d\'altitude)',value:'',hl:false},
    {label:'Rentrée étable génisses',value:'',hl:false},
    {label:'Stocks concentrés Emmontagnée',value:'',hl:false},
    {label:'Rentrée étable autres espèces',value:'',hl:false},
  ];
}

// Périodes laitières Beaufort :
// lait_hiver  : avril, décembre, janvier, février, mars
// lait_mi     : mai, novembre
// lait_ete    : juin, juillet, août, septembre, octobre
const SC = {
  lait_hiver: {accent:'#1d4ed8', light:'#eff6ff', badge:'#bfdbfe', label:'Lait Hiver',    emoji:'🏔️', text:'#1e3a8a'},
  lait_mi:    {accent:'#7c3aed', light:'#f5f3ff', badge:'#ddd6fe', label:'Lait Mi-saison', emoji:'🌿', text:'#4c1d95'},
  lait_ete:   {accent:'#15803d', light:'#f0fdf4', badge:'#bbf7d0', label:'Lait Été',       emoji:'🌞', text:'#14532d'},
};

function getSeason(p) {
  const s = p.toLowerCase();
  // Lait Hiver : avril, décembre, janvier, février, mars
  if(s.includes('avril')||s.includes('déc')||s.includes('jan')||s.includes('fév')||s.includes('mars')) return 'lait_hiver';
  // Lait Mi-saison : mai, novembre
  if(s.includes('mai')||s.includes('nov')) return 'lait_mi';
  // Lait Été : juin, juillet, août, septembre, octobre
  return 'lait_ete';
}

// ─── State ───────────────────────────────────────────────────────────────────

let state = {
  campagne: 2026,
  allData: {},
  tab: 'calendrier',
  filter: 'all',
  campMenu: false,
  menuOpen: false,
  pdfLoading: false,
};

function getcamp(yr) {
  const d = state.allData[yr] || {};
  return {
    periodes: d.periodes || makePeriodes(yr),
    dates:    d.dates    || makeDates(),
    lait:     d.lait     || makeLait(yr),
  };
}

function setState(patch) {
  Object.assign(state, patch);
  render();
}

// ─── Storage ─────────────────────────────────────────────────────────────────

function save(allData) {
  try { localStorage.setItem('beaufort-cal', JSON.stringify(allData)); } catch(_){}
}

function saveAndToast(allData) {
  save(allData);
}

function load() {
  try {
    const d = localStorage.getItem('beaufort-cal');
    if(d) state.allData = JSON.parse(d);
  } catch(_){}
}

// ─── Actions ─────────────────────────────────────────────────────────────────

// Debounced save — silently writes to localStorage, NO toast, NO render
let _saveTimer = null;
function debouncedSave() {
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(() => save(state.allData), 1500);
}

function updateData(idx, field, value) {
  const camp = getcamp(state.campagne);
  const periodes = camp.periodes.map((r,i)=>i===idx?{...r,[field]:value}:r);
  state.allData = {...state.allData, [state.campagne]:{periodes, dates:camp.dates, lait:camp.lait}};
  debouncedSave(); // silent, no render
}

function updateDates(idx, value) {
  const camp = getcamp(state.campagne);
  const dates = camp.dates.map((d,i)=>i===idx?{...d,value}:d);
  state.allData = {...state.allData, [state.campagne]:{periodes:camp.periodes, dates, lait:camp.lait}};
  debouncedSave();
}

function updateLait(idx, value) {
  const camp = getcamp(state.campagne);
  const lait = camp.lait.map((r,i)=>i===idx?{...r,litres:value}:r);
  state.allData = {...state.allData, [state.campagne]:{periodes:camp.periodes, dates:camp.dates, lait}};
  debouncedSave();
}

function resetCampagne() {
  if(!confirm(`Effacer les données de la campagne ${state.campagne}–${state.campagne+1} ?`)) return;
  const next = {...state.allData, [state.campagne]:{periodes:makePeriodes(state.campagne),dates:makeDates(),lait:makeLait(state.campagne)}};
  state.allData = next;
  save(next);
  setState({menuOpen:false});
}

function exportCSV() {
  const {periodes} = getcamp(state.campagne);
  const csv = ["Période,VL Traites,VL Taries,Pension Traites,Pension Taries,Ration,Concentré",
    ...periodes.map(r=>`"${r.periode}","${r.vlT}","${r.vlTaries}","${r.pensionT}","${r.pensionTaries}","${r.ration}","${r.concentre}"`)
  ].join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'}));
  a.download=`calendrier-${state.campagne}-${state.campagne+1}.csv`;
  a.click();
  setState({menuOpen:false});
}

function generatePDF() {
  setState({menuOpen:false, pdfLoading:true});
  const camp = getcamp(state.campagne);
  const {periodes, dates} = camp;
  const yr = state.campagne;

  try {
    const {jsPDF} = window.jspdf;
    const doc = new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    const W=190; let y=12;
    const gf=[212,237,218];

    // Title
    doc.setFont('helvetica','bold'); doc.setFontSize(16);
    doc.text("Calendrier d'Alimentation", 105, y, {align:'center'}); y+=7;
    doc.setFont('helvetica','bold'); doc.setFontSize(12);
    doc.setTextColor(46,125,69);
    doc.text("Campagne " + yr + "–" + (yr+1), 105, y, {align:'center'});
    doc.setTextColor(0,0,0); y+=6;
    doc.setFont('helvetica','normal'); doc.setFontSize(9);
    doc.text("Nom ou raison sociale :", 10, y); y+=5;

    // Dates section header
    doc.setFillColor(...gf); doc.rect(10,y,W,5,'F');
    doc.setDrawColor(150); doc.rect(10,y,W,5);
    doc.setFont('helvetica','bold'); doc.setFontSize(8);
    doc.text("Dates principales de conduite du troupeau sur l'année", 105, y+3.5, {align:'center'}); y+=5;

    // Dates table
    doc.autoTable({
      startY:y, margin:{left:10,right:10}, tableWidth:W, head:[],
      body:[
        [dates[0].label,dates[0].value||'',dates[1].label,dates[1].value||''],
        [dates[2].label,dates[2].value||'',dates[3].label,dates[3].value||''],
        [dates[4].label,dates[4].value||'',dates[5].label,dates[5].value||''],
        [dates[6].label,dates[6].value||'',dates[7].label,dates[7].value||''],
        [dates[8].label,dates[8].value||'',dates[9].label,dates[9].value||''],
        [dates[10].label,dates[10].value||'',dates[11].label,dates[11].value||''],
        [dates[12].label,dates[12].value||'',dates[13].label,dates[13].value||''],
      ],
      columnStyles:{0:{cellWidth:52,fontStyle:'italic',fontSize:7.5},1:{cellWidth:40,fontSize:7.5},2:{cellWidth:52,fontStyle:'italic',fontSize:7.5},3:{cellWidth:40,fontSize:7.5}},
      styles:{fontSize:7.5,cellPadding:1,lineColor:[150,150,150],lineWidth:0.2},
      didParseCell:(d)=>{if([1,2,5].includes(d.row.index)){d.cell.styles.fillColor=gf;d.cell.styles.fontStyle='bold';}},
      theme:'grid',
    });
    y=doc.lastAutoTable.finalY+4;

    const sCol={spring:[232,245,236],summer:[254,243,226],autumn:[255,241,236],winter:[239,246,255]};
    const sBrd={spring:[46,125,69],summer:[180,83,9],autumn:[194,65,12],winter:[29,78,216]};

    doc.autoTable({
      startY:y, margin:{left:10,right:10}, tableWidth:W,
      head:[
        [
          {content:`Année ${yr}–${yr+1}`,rowSpan:2,styles:{fontStyle:'bold',fillColor:gf,halign:'left'}},
          {content:"Sur l'exploitation",colSpan:2,styles:{fontStyle:'bold',fillColor:gf,halign:'center'}},
          {content:'Pension – Hiverne',colSpan:2,styles:{fontStyle:'bold',fillColor:gf,halign:'center'}},
          {content:'Nature ration de base',rowSpan:2,styles:{fontStyle:'bold',fillColor:gf,halign:'left'}},
          {content:'Nature concentré',rowSpan:2,styles:{fontStyle:'bold',fillColor:gf,halign:'center'}},
        ],
        [
          {content:'VL Traites',styles:{fontStyle:'bold',fillColor:[220,240,220],halign:'center'}},
          {content:'VL Taries',styles:{fontStyle:'bold',fillColor:[220,240,220],halign:'center'}},
          {content:'VL Traites',styles:{fontStyle:'bold',fillColor:[220,240,220],halign:'center'}},
          {content:'VL Taries',styles:{fontStyle:'bold',fillColor:[220,240,220],halign:'center'}},
        ],
      ],
      body:periodes.map(r=>[r.periode,r.vlT||'',r.vlTaries||'',r.pensionT||'',r.pensionTaries||'',r.ration||'',r.concentre||'']),
      columnStyles:{
        0:{cellWidth:30,fontSize:6.5},
        1:{cellWidth:13,halign:'center',fontStyle:'bold',fontSize:7},
        2:{cellWidth:13,halign:'center',fontSize:7},
        3:{cellWidth:13,halign:'center',fontSize:7},
        4:{cellWidth:13,halign:'center',fontSize:7},
        5:{cellWidth:82,fontSize:6.5},
        6:{cellWidth:16,halign:'center',fontSize:7},
      },
      styles:{fontSize:7,cellPadding:1,lineColor:[150,150,150],lineWidth:0.2,overflow:'linebreak'},
      didParseCell:(d)=>{if(d.section==='body'){const s=getSeason(d.row.raw[0]);d.cell.styles.fillColor=sCol[s]||[255,255,255];}},
      didDrawCell:(d)=>{
        if(d.section==='body'&&d.column.index===0){
          const s=getSeason(d.row.raw[0]);const[r,g,b]=sBrd[s]||[200,200,200];
          doc.setDrawColor(r,g,b);doc.setLineWidth(0.8);
          doc.line(d.cell.x,d.cell.y,d.cell.x,d.cell.y+d.cell.height);
          doc.setLineWidth(0.2);doc.setDrawColor(150,150,150);
        }
      },
      theme:'grid',
    });

    doc.save(`calendrier-alimentation-${yr}-${yr+1}.pdf`);
  } catch(err) { alert('Erreur PDF : '+err.message); }
  setState({pdfLoading:false});
}

// ─── Render ───────────────────────────────────────────────────────────────────

function render() {
  const {campagne, tab, filter, campMenu, menuOpen, pdfLoading} = state;
  const {periodes:data, dates, lait} = getcamp(campagne);
  const filtered = filter==='all' ? data : data.filter(r=>getSeason(r.periode)===filter);
  const filled = data.filter(r=>r.vlT!=='');
  const filledTot = data.filter(r=>r.vlT!==''||r.vlTaries!=='');
  const avg = filledTot.length>0 ? (filledTot.reduce((a,r)=>a+(parseFloat(r.vlT)||0)+(parseFloat(r.vlTaries)||0),0)/filledTot.length).toFixed(1) : '—';
  const max = filledTot.length>0 ? Math.max(...filledTot.map(r=>(parseFloat(r.vlT)||0)+(parseFloat(r.vlTaries)||0))) : '—';

  const app = document.getElementById('app');

  app.innerHTML = `
  <div style="min-height:100vh;background:#f7f5f0;">

    <!-- HEADER -->
    <header class="no-print" style="background:#fff;border-bottom:3px solid #2e7d45;box-shadow:0 2px 16px #00000010;padding:0 16px;display:flex;align-items:center;min-height:64px;gap:12px;position:sticky;top:0;z-index:100;">

      <!-- Logo + titre + bouton campagne -->
      <div style="display:flex;align-items:center;gap:12px;padding-right:16px;border-right:1px solid #e2ddd5;flex-shrink:0;">
        <div style="width:40px;height:40px;background:linear-gradient(135deg,#2e7d45,#1a5c2a);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 3px 10px #2e7d4544;">🐄</div>
        <div>
          <div style="font-size:14px;font-weight:800;color:#2c2416;">Calendrier d'Alimentation</div>
          <div style="margin-top:3px;">
            <div id="camp-btn-wrap" style="position:relative;display:inline-block;">
              <button id="camp-btn" style="background:${campMenu?'#2e7d45':'#1a5c2a'};border:none;border-radius:7px;padding:2px 10px;display:flex;align-items:center;gap:6px;cursor:pointer;transition:all .15s;">
                <span style="font-size:11px;font-weight:800;color:#fff;">Beaufort · ${campagne}–${campagne+1}</span>
                <span style="font-size:9px;color:#a8d8b8;">${campMenu?'▲':'▼'}</span>
              </button>
              ${campMenu ? `
              <div id="camp-menu" class="dropdown" style="position:absolute;top:calc(100% + 6px);left:0;background:#fff;border:1px solid #e2ddd5;border-radius:12px;box-shadow:0 8px 28px #0000001a;min-width:190px;z-index:2000;overflow:hidden;">
                <div style="padding:8px 16px 6px;font-size:9px;color:#7a6f60;letter-spacing:2px;text-transform:uppercase;border-bottom:1px solid #e2ddd5;">Choisir la campagne</div>
                ${CAMPAGNES.map(yr=>{
                  const has = !!(state.allData[yr]?.periodes?.some(r=>r.vlT));
                  const active = yr===campagne;
                  return `<button onclick="selectCampagne(${yr})" style="display:flex;align-items:center;justify-content:space-between;width:100%;padding:10px 16px;background:${active?'#e8f5ec':'transparent'};border:none;border-bottom:1px solid #e2ddd5;color:${active?'#2e7d45':'#2c2416'};font-size:14px;font-weight:${active?800:400};cursor:pointer;transition:background .12s;"
                    onmouseover="if(!${active})this.style.background='#f4f1eb'" onmouseout="if(!${active})this.style.background='transparent'">
                    <span>${yr}–${yr+1}</span>
                    <span style="display:flex;align-items:center;gap:6px;">
                      ${has?`<span style="font-size:10px;color:#2e7d45;font-weight:600;">●</span>`:''}
                      ${active?`<span style="color:#2e7d45;font-size:14px;">✓</span>`:''}
                    </span>
                  </button>`;
                }).join('')}
              </div>` : ''}
            </div>
          </div>
        </div>
      </div>

      <!-- Stats compactes -->
      <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap;">
        ${[
          {icon:'📊', l:'Moy. VL', v:avg},
          {icon:'🏆', l:'Max VL',  v:max},
          {icon:'✏️', l:'Saisies', v:`${filled.length}/24`},
        ].map(s=>`
        <div style="display:flex;align-items:center;gap:6px;border-left:1px solid #e2ddd5;padding-left:16px;">
          <div>
            <div style="font-size:16px;font-weight:800;color:#2e7d45;line-height:1.1;">${s.v}</div>
            <div style="font-size:8px;color:#7a6f60;text-transform:uppercase;letter-spacing:.5px;">${s.l}</div>
          </div>
        </div>`).join('')}
      </div>

      <div style="flex:1;"></div>

      <!-- Hamburger -->
      <div id="menu-btn-wrap" style="position:relative;display:flex;align-items:center;">
        <button id="menu-btn" style="background:${menuOpen?'#e8f5ec':'transparent'};border:1.5px solid ${menuOpen?'#2e7d45':'#e2ddd5'};border-radius:9px;width:40px;height:40px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;cursor:pointer;transition:all .18s;">
          ${menuOpen
            ? `<span style="font-size:16px;color:#2e7d45;line-height:1;">✕</span>`
            : `<span style="display:block;width:16px;height:2px;background:#7a6f60;border-radius:2px;"></span><span style="display:block;width:16px;height:2px;background:#7a6f60;border-radius:2px;"></span><span style="display:block;width:16px;height:2px;background:#7a6f60;border-radius:2px;"></span>`
          }
        </button>

        ${menuOpen ? `
        <div id="main-menu" class="dropdown" style="position:absolute;top:calc(100% + 10px);right:0;background:#fff;border:1px solid #e2ddd5;border-radius:14px;box-shadow:0 8px 32px #0000001c;min-width:250px;z-index:1000;overflow:hidden;">
          <div style="padding:9px 16px 6px;font-size:9px;color:#7a6f60;letter-spacing:2px;text-transform:uppercase;border-bottom:1px solid #e2ddd5;">Actions — ${campagne}–${campagne+1}</div>
          <button onclick="generatePDF()" style="display:flex;align-items:center;gap:12px;width:100%;padding:12px 16px;background:transparent;border:none;color:#2c2416;font-size:13px;text-align:left;border-bottom:1px solid #e2ddd5;transition:background .12s;"

    {id:'lait_ete',  ...SC.lait_ete},
  ];
  return `
  <div style="display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap;align-items:center;">
    ${chips.map(f=>{
      const active=filter===f.id;
      const col=f.accent||SC[f.id]?.accent||'#2e7d45';
      return `<button class="chip" onclick="setState({filter:'${f.id}'})"
        style="background:${active?col:'#fff'};border-color:${active?col:'#e2ddd5'};color:${active?'#fff':'#7a6f60'};font-weight:${active?600:400};">
        ${f.emoji?`<span>${f.emoji}</span>`:''}${f.id==='all'?'Tout afficher':f.label}

  </div>

  <div style="border-radius:14px;border:1px solid #e2ddd5;overflow:hidden;box-shadow:0 2px 16px #00000009;">
    <div style="overflow-x:auto;">
      <table style="width:100%;border-collapse:collapse;min-width:800px;">
        <thead>
          <tr style="background:#f4f1eb;">
            ${[{l:'Période',w:'16%'},{l:'VL Traites',w:'9%'},{l:'VL Taries',w:'9%'},{l:'Pension Traites',w:'10%'},{l:'Pension Taries',w:'10%'},{l:'Nature ration de base',w:'30%'},{l:'Concentré',w:'8%'}].map(h=>
              `<th style="padding:11px 10px;text-align:left;font-size:10px;color:#7a6f60;letter-spacing:.8px;font-weight:600;border-bottom:2px solid #e2ddd5;text-transform:uppercase;width:${h.w};">${h.l}</th>`
            ).join('')}
          </tr>
        </thead>
        <tbody>
          ${filtered.map(row=>{
            const s=getSeason(row.periode);

            const has=row.vlT||row.vlTaries||row.ration;
            return `<tr style="background:${has?sc.light:'#fff'};border-left:4px solid ${has?sc.accent:'transparent'};">
              <td style="padding:7px 10px;border-bottom:1px solid #e2ddd5;">
                <div style="display:flex;align-items:center;gap:7px;">
                  <span style="background:${sc.badge};color:${sc.text};border-radius:6px;padding:1px 7px;font-size:11px;font-weight:700;">${sc.emoji}</span>
                  <span style="font-size:12px;color:#2c2416;font-weight:${has?600:400};white-space:nowrap;">${row.periode}</span>
                </div>
              </td>
              <td style="padding:5px 7px;border-bottom:1px solid #e2ddd5;"><input class="cell-input" data-idx="${gi}" data-field="vlT" value="${row.vlT}" placeholder="—" style="text-align:center;font-weight:700;border-color:${row.vlT?sc.accent+'55':'#d0c8be'};"/></td>
              <td style="padding:5px 7px;border-bottom:1px solid #e2ddd5;"><input class="cell-input" data-idx="${gi}" data-field="vlTaries" value="${row.vlTaries}" placeholder="—" style="text-align:center;border-color:${row.vlTaries?sc.accent+'55':'#d0c8be'};"/></td>
              <td style="padding:5px 7px;border-bottom:1px solid #e2ddd5;"><input class="cell-input" data-idx="${gi}" data-field="pensionT" value="${row.pensionT}" placeholder="—" style="text-align:center;border-color:${row.pensionT?sc.accent+'55':'#d0c8be'};"/></td>

              <td style="padding:5px 7px;border-bottom:1px solid #e2ddd5;"><input class="cell-input" data-idx="${gi}" data-field="ration" value="${row.ration}" placeholder="Herbe, Foin, Luzerne…" style="border-color:${row.ration?sc.accent+'55':'#d0c8be'};"/></td>
              <td style="padding:5px 7px;border-bottom:1px solid #e2ddd5;"><input class="cell-input" data-idx="${gi}" data-field="concentre" value="${row.concentre}" placeholder="UC/UL" style="text-align:center;border-color:${row.concentre?sc.accent+'55':'#d0c8be'};"/></td>

function renderLait(lait, periodes, campagne) {
  // For each month, compute avg VL traites from the 2 matching fortnights
  const MOIS_IDX = ['avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre','janvier','février','mars'];

  function avgVLForMois(moisLabel) {
    const m = moisLabel.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
    const rows = periodes.filter(r => {
      const p = r.periode.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
      return p.includes(m);
    });
    const vals = rows.map(r=>(parseFloat(r.vlT)||0)+(parseFloat(r.vlTaries)||0)).filter(v=>v>0);
    return vals.length ? (vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1) : '—';
  }

  const totalLitres = lait.reduce((s,r)=>s+(parseFloat(r.litres)||0),0);
  const moisRenseignes = lait.filter(r=>r.litres!=='').length;

  // Compute max for chart scaling
  const maxL = Math.max(...lait.map(r=>parseFloat(r.litres)||0), 1);

  // Season color per month index (0=avril)
  const moisSeason = ['lait_hiver','lait_mi','lait_ete','lait_ete','lait_ete','lait_ete','lait_ete','lait_mi','lait_hiver','lait_hiver','lait_hiver','lait_hiver'];

  const rows = lait.map((row, i) => {
    const season = moisSeason[i];
    const sc = SC[season];
    const litres = parseFloat(row.litres) || 0;
    const avgVL = avgVLForMois(row.mois);
    const avgLitresParVache = (litres > 0 && avgVL !== '—') ? (litres / parseFloat(avgVL)).toFixed(0) : '—';
    const litresParJour = litres > 0 ? (litres / JOURS_MOIS[i]).toFixed(0) : '—';
    const litresParVacheParJour = (litres > 0 && avgVL !== '—') ? (litres / parseFloat(avgVL) / JOURS_MOIS[i]).toFixed(1) : '—';
    const barW = litres > 0 ? Math.round((litres / maxL) * 100) : 0;

    return `<tr style="background:${litres?sc.light:'#fff'};border-left:4px solid ${litres?sc.accent:'transparent'};">
      <td style="padding:8px 12px;border-bottom:1px solid #e2ddd5;white-space:nowrap;">
        <div style="display:flex;align-items:center;gap:8px;">
          <span style="background:${sc.badge};color:${sc.text};border-radius:6px;padding:1px 8px;font-size:11px;font-weight:700;">${sc.emoji}</span>
          <span style="font-size:13px;font-weight:${litres?600:400};color:#2c2416;">${row.mois} <span style="font-size:10px;color:#7a6f60;">${row.annee}</span></span>
        </div>
      </td>
      <td style="padding:6px 8px;border-bottom:1px solid #e2ddd5;width:160px;">
        <div style="display:flex;align-items:center;gap:8px;">
          <input data-lait-idx="${i}" value="${row.litres}" placeholder="0"
            style="width:110px;background:#fafaf8;border:1.5px solid ${litres?sc.accent+'55':'#d0c8be'};border-radius:6px;padding:5px 8px;font-size:13px;font-weight:${litres?700:400};color:#2c2416;text-align:right;outline:none;font-family:inherit;"
            onfocus="this.style.borderColor='#2e7d45';this.style.background='#fff'"
            onblur="this.style.background='#fafaf8'"/>
          <span style="font-size:11px;color:#7a6f60;">L</span>
        </div>
      </td>
      <td style="padding:6px 12px;border-bottom:1px solid #e2ddd5;font-size:13px;color:#7a6f60;text-align:center;">${JOURS_MOIS[i]}j</td>
      <td style="padding:6px 12px;border-bottom:1px solid #e2ddd5;font-size:12px;color:#7a6f60;text-align:center;">${litresParJour !== '—' ? litresParJour+' L/j' : '—'}</td>
      <td style="padding:6px 12px;border-bottom:1px solid #e2ddd5;text-align:center;">
        <span style="font-size:13px;font-weight:600;color:${avgVL!=='—'?'#2c2416':'#ccc'};">${avgVL}</span>
        <span style="font-size:10px;color:#7a6f60;margin-left:2px;">${avgVL!=='—'?'VL':''}</span>
      </td>
      <td style="padding:6px 12px;border-bottom:1px solid #e2ddd5;text-align:center;">
        <span style="font-size:14px;font-weight:700;color:${avgLitresParVache!=='—'?sc.text:'#ccc'};">${avgLitresParVache}</span>
        <span style="font-size:10px;color:#7a6f60;margin-left:2px;">${avgLitresParVache!=='—'?'L/VL/mois':''}</span>
      </td>
      <td style="padding:6px 12px;border-bottom:1px solid #e2ddd5;text-align:center;">
        <span style="font-size:14px;font-weight:700;color:${litresParVacheParJour!=='—'?sc.accent:'#ccc'};">${litresParVacheParJour}</span>
        <span style="font-size:10px;color:#7a6f60;margin-left:2px;">${litresParVacheParJour!=='—'?'L/VL/j':''}</span>
      </td>
      <td style="padding:6px 12px;border-bottom:1px solid #e2ddd5;min-width:100px;">
        <div style="background:#f0ede8;border-radius:4px;height:10px;overflow:hidden;">
          <div style="width:${barW}%;height:100%;background:${sc.accent};border-radius:4px;transition:width .3s;"></div>
        </div>
      </td>
    </tr>`;
  }).join('');

  // Totals row
  const totalJours = JOURS_MOIS.reduce((a,b)=>a+b,0);
  const avgLParJ = totalLitres>0 ? (totalLitres/totalJours).toFixed(0) : '—';
  const avgVLAnn = (() => {
    const vals = periodes.map(r=>(parseFloat(r.vlT)||0)+(parseFloat(r.vlTaries)||0)).filter(v=>v>0);
    return vals.length ? (vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1) : '—';
  })();
  const totalParVL = (totalLitres>0 && avgVLAnn!=='—') ? (totalLitres/parseFloat(avgVLAnn)).toFixed(0) : '—';
  const avgParVLParJ = (totalLitres>0 && avgVLAnn!=='—') ? (totalLitres/parseFloat(avgVLAnn)/totalJours).toFixed(1) : '—';

  // Mini bar chart (SVG)
  const svgW = 12 * 52 + 40;
  const svgH = 100;
  const bars = lait.map((row,i) => {
    const v = parseFloat(row.litres)||0;
    const bH = v>0 ? Math.round((v/maxL)*70) : 1;
    const x = 30 + i*52;
    const sc = SC[moisSeason[i]];
    return `<g>
      <rect x="${x}" y="${svgH-20-bH}" width="40" height="${bH}" fill="${v?sc.accent:'#e5e5e5'}" rx="3" opacity="${v?0.85:0.3}"/>
      ${v>0?`<text x="${x+20}" y="${svgH-22-bH}" text-anchor="middle" fill="${sc.accent}" font-size="8" font-weight="bold" font-family="sans-serif">${v>=1000?(v/1000).toFixed(0)+'k':v}</text>`:''}
      <text x="${x+20}" y="${svgH-5}" text-anchor="middle" fill="#7a6f60" font-size="7.5" font-family="sans-serif">${row.mois.substring(0,3)}</text>
    </g>`;
  }).join('');

  // ── Comparaison inter-campagnes litres/vache/an ──
  function calcLVacheAn(yr) {
    const camp = state.allData[yr];
    if (!camp) return null;
    const laitData = camp.lait || makeLait(yr);
    const periodesData = camp.periodes || makePeriodes(yr);
    const total = laitData.reduce((s,r)=>s+(parseFloat(r.litres)||0),0);
    if (!total) return null;
    const vlVals = periodesData.map(r=>(parseFloat(r.vlT)||0)+(parseFloat(r.vlTaries)||0)).filter(v=>v>0);
    if (!vlVals.length) return null;
    const avgVL = vlVals.reduce((a,b)=>a+b,0)/vlVals.length;
    return Math.round(total / avgVL);
  }

  const annualData = CAMPAGNES.map(yr => ({yr, val: calcLVacheAn(yr)})).filter(d=>d.val!==null);
  const maxAnn = annualData.length ? Math.max(...annualData.map(d=>d.val)) : 0;
  const thisCampVal = calcLVacheAn(campagne);

  const annualChart = annualData.length < 2 ? `
  <div style="text-align:center;padding:30px;color:#7a6f60;font-size:13px;">
    Renseignez au moins 2 campagnes pour voir la comparaison
  </div>` : (() => {
    const svgW2 = annualData.length * 80 + 60;
    const svgH2 = 130;
    const annBars = annualData.map((d,i) => {
      const bH = Math.round((d.val / maxAnn) * 90);
      const x = 40 + i * 80;
      const isThis = d.yr === campagne;
      const col = isThis ? '#2e7d45' : '#93c4a0';
      return `<g>
        <rect x="${x}" y="${svgH2-30-bH}" width="50" height="${bH}" fill="${col}" rx="5" opacity="${isThis?1:0.7}"/>
        <text x="${x+25}" y="${svgH2-32-bH}" text-anchor="middle" fill="${col}" font-size="9" font-weight="bold" font-family="sans-serif">${d.val.toLocaleString('fr-FR')}</text>

function renderGraphique(data, filled, campagne) {
  if(!filled.length) return `
  <div style="text-align:center;padding:80px 20px;background:#fff;border:1.5px dashed #e2ddd5;border-radius:16px;">
    <div style="font-size:52px;margin-bottom:14px;">📊</div>
    <div style="font-size:16px;color:#2c2416;margin-bottom:6px;font-weight:600;">Aucune donnée pour ${campagne}–${campagne+1}</div>
    <div style="font-size:13px;color:#7a6f60;">Renseignez les VL Traites dans l'onglet Calendrier</div>
  </div>`;

  function barChart(field, title, color, maxV, h, barH, yMax) {
    const bars = data.map((row,i)=>{
      const v=parseFloat(row[field])||0;
      const sc=SC[getSeason(row.periode)];
      const bH=v*barH; const x=32+i*38;
      const col=typeof color==='function'?color(sc):color;
      return `<g>
        <rect x="${x}" y="${yMax-bH}" width="30" height="${bH||2}" fill="${v?col:'#e5e5e5'}" opacity="${v?1:0.35}" rx="4"/>
        ${v>0?`<text x="${x+15}" y="${yMax-bH-4}" text-anchor="middle" fill="${col}" font-size="7.5" font-weight="bold" font-family="sans-serif">${v}</text>`:''}
      </g>`;
    }).join('');
    const gridLines = Array.from({length:6},(_,j)=>j*(maxV/5)).map(v=>`
      <line x1="30" y1="${yMax-v*barH}" x2="${data.length*38}" y2="${yMax-v*barH}" stroke="#e2ddd5" stroke-width="1"/>
      <text x="26" y="${yMax-v*barH+4}" text-anchor="end" fill="#7a6f60" font-size="8" font-family="sans-serif">${Math.round(v)}</text>`).join('');
    return `
    <div style="background:#fff;border-radius:14px;border:1px solid #e2ddd5;padding:20px 20px 12px;margin-bottom:20px;box-shadow:0 2px 10px #00000008;">
      <div style="font-size:11px;color:#7a6f60;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:16px;font-weight:600;">${title} — ${campagne}–${campagne+1}</div>
      <div style="overflow-x:auto;">
        <svg viewBox="0 0 ${data.length*38} ${h}" style="width:100%;min-width:720px;height:${h}px;">
          ${gridLines}${bars}
        </svg>
      </div>
    </div>`;
  }

  return barChart('vlT','📈 Évolution des VL Traites',sc=>sc.accent,25,210,6.8,185)
       + barChart('vlTaries','📉 Évolution des VL Taries','#1d4ed8',12,140,8.5,115)
       + `<div style="display:flex;gap:10px;flex-wrap:wrap;">
    ${Object.entries(SC).map(([k,s])=>`
    <div style="display:flex;align-items:center;gap:7px;background:${s.light};border:1px solid ${s.badge};border-radius:20px;padding:4px 14px;">
      <div style="width:10px;height:10px;background:${s.accent};border-radius:2px;"></div>
      <span style="font-size:11px;color:${s.text};font-weight:600;">${s.emoji} ${s.label}</span>
    </div>`).join('')}
  </div>`;
}

// ─── Event binding ────────────────────────────────────────────────────────────

function bindEvents() {
  // Camp button
  const cb = document.getElementById('camp-btn');
  if(cb) cb.onclick = (e)=>{e.stopPropagation(); setState({campMenu:!state.campMenu, menuOpen:false});};
  // Menu button
  const mb = document.getElementById('menu-btn');
  if(mb) mb.onclick = (e)=>{e.stopPropagation(); setState({menuOpen:!state.menuOpen, campMenu:false});};

  // Calendar inputs — update state in memory only, no re-render
  document.querySelectorAll('.cell-input').forEach(inp=>{
    inp.addEventListener('input', e=>{
      updateData(+e.target.dataset.idx, e.target.dataset.field, e.target.value);
    });
    inp.addEventListener('focus', e=>{ e.target.style.borderColor='#2e7d45'; e.target.style.background='#fff'; });
    inp.addEventListener('blur',  e=>{
      e.target.style.background='#fafaf8';
      e.target.style.borderColor='';
      clearTimeout(_saveTimer); saveAndToast(state.allData); // force-save + toast on leave
    });
  });

  // Lait inputs
  document.querySelectorAll('[data-lait-idx]').forEach(inp=>{
    inp.addEventListener('input', e=>{
      updateLait(+e.target.getAttribute('data-lait-idx'), e.target.value);
    });
    inp.addEventListener('focus', e=>{ e.target.style.borderColor='#2e7d45'; e.target.style.background='#fff'; });
    inp.addEventListener('blur',  e=>{
      e.target.style.background='#fafaf8';
      clearTimeout(_saveTimer); saveAndToast(state.allData);
    });
  });

  // Date inputs
  document.querySelectorAll('[data-didx]').forEach(inp=>{
    inp.addEventListener('input', e=>{ updateDates(+e.target.dataset.didx, e.target.value); });
    inp.addEventListener('blur',  e=>{ clearTimeout(_saveTimer); saveAndToast(state.allData); });
  });

  // Close dropdowns on outside click
  document.addEventListener('mousedown', function outsideClick(e) {
    const cw = document.getElementById('camp-btn-wrap');
    const mw = document.getElementById('menu-btn-wrap');
    if(state.campMenu && cw && !cw.contains(e.target)) { state.campMenu=false; render(); }
    if(state.menuOpen && mw && !mw.contains(e.target)) { state.menuOpen=false; render(); }
  }, {once:true});
}

function selectCampagne(yr) {
  setState({campagne:yr, campMenu:false, tab:'calendrier', filter:'all'});
}

function exportJSON() {
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([JSON.stringify(state.allData,null,2)],{type:'application/json'}));
  a.download='beaufort-toutes-campagnes.json'; a.click();
  setState({menuOpen:false});
}

function importJSON(e) {
  const file=e.target.files[0]; if(!file) return;
  const r=new FileReader();
  r.onload=ev=>{
    try {
      const d=JSON.parse(ev.target.result);
      state.allData={...state.allData,...d};
      save(state.allData);
      setState({menuOpen:false});
      alert('Données importées avec succès !');
    } catch(_){ alert('Fichier invalide.'); }
  };
  r.readAsText(file);
}

async function ghExecute(mode) {
  const token = document.getElementById('gh-token').value.trim();
  const repo  = document.getElementById('gh-repo').value.trim();
  const file  = document.getElementById('gh-file').value.trim() || 'data.json';
  const status = document.getElementById('gh-status');

  if(!token||!repo){ status.style.color='#dc2626'; status.textContent='⚠️ Token et dépôt requis.'; return; }

  ghSaveConfig({token, repo, file});
  status.style.color='#7a6f60'; status.textContent='⏳ Connexion à GitHub…';

  const headers = { 'Authorization':'token '+token, 'Accept':'application/vnd.github.v3+json', 'Content-Type':'application/json' };
  const apiUrl = `https://api.github.com/repos/${repo}/contents/${file}`;

  try {
    if(mode==='save') {
      // Get current SHA if file exists
      let sha = null;
      try {
        const r = await fetch(apiUrl, {headers});
        if(r.ok){ const d=await r.json(); sha=d.sha; }
      } catch(_){}

      const content = btoa(unescape(encodeURIComponent(JSON.stringify(state.allData, null, 2))));
      const body = { message:`Sauvegarde Beaufort ${new Date().toLocaleDateString('fr-FR')}`, content };
      if(sha) body.sha = sha;

      const res = await fetch(apiUrl, { method:'PUT', headers, body:JSON.stringify(body) });
      if(res.ok){
        status.style.color='#2e7d45';
        status.textContent='✅ Sauvegardé sur GitHub avec succès !';
        setTimeout(()=>document.getElementById('gh-modal')?.remove(), 1500);
      } else {
        const err = await res.json();
        status.style.color='#dc2626';
        status.textContent='❌ Erreur : '+(err.message||res.status);
      }

    } else {
      // LOAD
      const res = await fetch(apiUrl, {headers});
      if(!res.ok){ status.style.color='#dc2626'; status.textContent='❌ Fichier introuvable sur GitHub.'; return; }
      const d = await res.json();
      const decoded = JSON.parse(decodeURIComponent(escape(atob(d.content.replace(/\n/g,'')))));
      state.allData = {...state.allData, ...decoded};
      save(state.allData);
      status.style.color='#2e7d45';
      status.textContent='✅ Données chargées depuis GitHub !';
      setTimeout(()=>{ document.getElementById('gh-modal')?.remove(); render(); }, 1200);
    }
  } catch(err) {
    status.style.color='#dc2626';
    status.textContent='❌ Erreur réseau : '+err.message;
  }
}

window.showGithubModal = showGithubModal;
window.ghExecute = ghExecute;

// ─── Init ────────────────────────────────────────────────────────────────────
load();
render();

// Expose functions called from inline onclick handlers
window.setState       = setState;
window.selectCampagne = selectCampagne;
window.generatePDF    = generatePDF;
window.exportCSV      = exportCSV;
window.exportJSON     = exportJSON;
window.importJSON     = importJSON;
window.resetCampagne  = resetCampagne;
</script>

<script>
// ─── PWA : Service Worker inline via Blob ────────────────────────────────────
const swCode = `
const CACHE='beaufort-v1';
const ASSETS=['/'];
self.addEventListener('install',e=>e.waitUntil(caches.open(CACHE).then(c=>c.addAll(ASSETS))));
self.addEventListener('fetch',e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).then(res=>{const clone=res.clone();caches.open(CACHE).then(c=>c.put(e.request,clone));return res;}).catch(()=>caches.match('/')))));
`;
if('serviceWorker' in navigator){
  const blob=new Blob([swCode],{type:'application/javascript'});
  const url=URL.createObjectURL(blob);
  navigator.serviceWorker.register(url,{scope:'./'})
    .then(()=>console.log('SW ok')).catch(e=>console.log('SW blob error',e));
}

// ─── PWA : Bouton Installer l'application ────────────────────────────────────
let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();
  deferredPrompt=e;
  const btn=document.getElementById('pwa-install-btn');
  if(btn){ btn.style.display='flex'; }
});
window.addEventListener('appinstalled',()=>{
  deferredPrompt=null;
  const btn=document.getElementById('pwa-install-btn');
  if(btn) btn.style.display='none';
});
function installPWA(){
  if(!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(()=>{ deferredPrompt=null; setState({menuOpen:false}); });
}
window.installPWA=installPWA;
</script>
